services:
  - type: web
    name: melos-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: MOCK_API_URL
        fromService:
          name: melos-mock-api
          type: web
          property: host
      - key: FALCON_CLIENT_ID
        sync: false
      - key: FALCON_CLIENT_SECRET
        sync: false
      - key: FALCON_CID
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: DEBUG_PASSWORD
        sync: false

  - type: web
    name: melos-mock-api
    env: docker
    dockerfilePath: ./mock-api/Dockerfile
    plan: free
