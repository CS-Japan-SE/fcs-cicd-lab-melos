<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メロスに聞け！</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
  <header class="bg-gray-800 border-b border-red-700 px-6 py-4">
    <h1 class="text-2xl font-bold text-red-400">メロスに聞け！</h1>
    <p class="text-sm text-gray-400">問え。メロスが答える。</p>
  </header>

  <main class="flex-1 flex flex-col max-w-2xl mx-auto w-full px-4 py-6">
    <div id="messages" class="flex-1 space-y-4 overflow-y-auto mb-4 min-h-[400px]">
      <div class="flex justify-start">
        <div class="bg-gray-700 rounded-lg px-4 py-3 max-w-prose">
          <p class="text-sm text-red-400 font-semibold mb-1">メロス</p>
          <p>何でも聞いてくれ。私は答える。走り続けるように。</p>
        </div>
      </div>
    </div>

    <div class="flex gap-2">
      <input
        id="input"
        type="text"
        placeholder="メロスへのメッセージを入力..."
        class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-red-500"
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button
        onclick="sendMessage()"
        class="bg-red-700 hover:bg-red-600 px-6 py-2 rounded-lg font-semibold transition-colors"
      >
        送信
      </button>
    </div>
  </main>

  <script>
    async function sendMessage() {
      const input = document.getElementById('input');
      const message = input.value.trim();
      if (!message) return;

      appendMessage('あなた', message, 'right');
      input.value = '';

      const thinking = appendMessage('メロス', '...', 'left');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        thinking.remove();
        appendMessage('メロス', data.reply || data.error, 'left');
      } catch (e) {
        thinking.remove();
        appendMessage('メロス', 'エラーが発生しました', 'left');
      }
    }

    function appendMessage(sender, text, side) {
      const container = document.getElementById('messages');
      const wrapper = document.createElement('div');
      wrapper.className = `flex justify-${side === 'right' ? 'end' : 'start'}`;

      const bubble = document.createElement('div');
      bubble.className = side === 'right'
        ? 'bg-red-800 rounded-lg px-4 py-3 max-w-prose'
        : 'bg-gray-700 rounded-lg px-4 py-3 max-w-prose';

      bubble.innerHTML = `
        <p class="text-sm ${side === 'right' ? 'text-gray-300' : 'text-red-400'} font-semibold mb-1">${sender}</p>
        <p>${text}</p>
      `;
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      container.scrollTop = container.scrollHeight;
      return wrapper;
    }
  </script>
</body>
</html>
