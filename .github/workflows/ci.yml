name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    name: Build, Inject Falcon Sensor & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "FRONTEND_IMAGE=ghcr.io/${REPO}/melos-frontend" >> $GITHUB_ENV
          echo "MOCK_API_IMAGE=ghcr.io/${REPO}/melos-mock-api" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- アプリイメージのビルド ---
      - name: Build frontend base image
        run: docker build -t melos-frontend-base:${{ github.sha }} ./frontend

      - name: Build mock-api image
        run: docker build -t ${{ env.MOCK_API_IMAGE }}:${{ github.sha }} ./mock-api

      # --- Falcon Container Sensor の取得 ---
      - name: Pull Falcon Container Sensor image
        run: |
          LATESTSENSOR=$(bash <(curl -Ls https://github.com/CrowdStrike/falcon-scripts/releases/latest/download/falcon-container-sensor-pull.sh) \
            -t falcon-container --platform x86_64 \
            -u ${{ secrets.FALCON_CLIENT_ID }} \
            -s ${{ secrets.FALCON_CLIENT_SECRET }} 2>&1 | tail -1)
          if [[ "$LATESTSENSOR" != registry.crowdstrike.com/* ]]; then
            echo "Failed to get sensor image: $LATESTSENSOR"
            exit 1
          fi
          echo "FALCON_SENSOR_IMAGE=$LATESTSENSOR" >> $GITHUB_ENV

      # --- falconutil patch-image で Sensorをイメージに埋め込む ---
      - name: Inject Falcon Sensor into frontend image
        run: |
          docker run --user 0:0 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --rm ${{ env.FALCON_SENSOR_IMAGE }} \
            falconutil patch-image \
            --source-image-uri melos-frontend-base:${{ github.sha }} \
            --target-image-uri ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --falcon-image-uri ${{ env.FALCON_SENSOR_IMAGE }} \
            --cid ${{ secrets.FALCON_CID }} \
            --container melos-frontend \
            --image-pull-policy IfNotPresent \
            --falconctl-opts "--tags=melos-frontend"

      # --- イメージをghcr.ioにpush ---
      - name: Push frontend image (with sensor)
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Push mock-api image
        run: |
          docker push ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.MOCK_API_IMAGE }}:${{ github.sha }} ${{ env.MOCK_API_IMAGE }}:latest
          docker push ${{ env.MOCK_API_IMAGE }}:latest

      # --- CrowdStrike FCS Scan ---
      - name: Create scan results directories
        run: mkdir -p ./scan-results/iac ./scan-results/images

      - name: CrowdStrike FCS - IaC Scan
        uses: crowdstrike/fcs-action@v2.0.0
        id: fcs-iac
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_region: us-1
          path: .
          report_formats: json
          output_path: ./scan-results/iac
          upload_results: true
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Convert IaC JSON to SARIF
        if: always() && hashFiles('./scan-results/iac/*.json') != ''
        run: python3 .github/scripts/fcs_to_sarif.py iac ./scan-results/iac ./scan-results/iac/results.sarif

      - name: Upload IaC SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('./scan-results/iac/results.sarif') != ''
        with:
          sarif_file: ./scan-results/iac/results.sarif
          category: fcs-iac

      - name: CrowdStrike FCS - Image Scan (frontend)
        uses: crowdstrike/fcs-action@v4.0.1
        id: fcs-image-frontend
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_region: us-1
          scan_type: image
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          report_formats: json
          output_path: ./scan-results/images/frontend.json
          upload_results: true
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Convert frontend image JSON to SARIF
        if: always() && hashFiles('./scan-results/images/frontend.json') != ''
        run: python3 .github/scripts/fcs_to_sarif.py image ./scan-results/images/frontend.json ./scan-results/images/frontend.sarif

      - name: Upload frontend image SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('./scan-results/images/frontend.sarif') != ''
        with:
          sarif_file: ./scan-results/images/frontend.sarif
          category: fcs-image-frontend

      - name: CrowdStrike FCS - Image Scan (mock-api)
        uses: crowdstrike/fcs-action@v4.0.1
        id: fcs-image-mock-api
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_region: us-1
          scan_type: image
          image: ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}
          report_formats: json
          output_path: ./scan-results/images/mock-api.json
          upload_results: true
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Convert mock-api image JSON to SARIF
        if: always() && hashFiles('./scan-results/images/mock-api.json') != ''
        run: python3 .github/scripts/fcs_to_sarif.py image ./scan-results/images/mock-api.json ./scan-results/images/mock-api.sarif

      - name: Upload mock-api image SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('./scan-results/images/mock-api.sarif') != ''
        with:
          sarif_file: ./scan-results/images/mock-api.sarif
          category: fcs-image-mock-api

      - name: Upload scan results as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fcs-scan-results
          path: ./scan-results/
          if-no-files-found: ignore
