name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    name: Build, Inject Falcon Sensor & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "FRONTEND_IMAGE=ghcr.io/${REPO}/melos-frontend" >> $GITHUB_ENV
          echo "MOCK_API_IMAGE=ghcr.io/${REPO}/melos-mock-api" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- г‚ўгѓ—гѓЄг‚¤гѓЎгѓјг‚ёгЃ®гѓ“гѓ«гѓ‰ ---
      - name: Build frontend base image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: melos-frontend-base:${{ github.sha }}
          load: true

      - name: Build mock-api image
        uses: docker/build-push-action@v5
        with:
          context: ./mock-api
          push: false
          tags: ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}
          load: true

      # --- Falcon Container Sensor гЃ®еЏ–еѕ— ---
      - name: Pull Falcon Container Sensor image
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
        run: |
          SCRIPT_OUTPUT=$(bash <(curl -Ls https://github.com/CrowdStrike/falcon-scripts/releases/latest/download/falcon-container-sensor-pull.sh) \
            -t falcon-container --platform x86_64 2>&1)
          echo "$SCRIPT_OUTPUT"
          LATESTSENSOR=$(echo "$SCRIPT_OUTPUT" | grep -E 'registry\.crowdstrike\.com/[^ ]+' | tail -1)
          echo "Extracted sensor image: $LATESTSENSOR"
          echo "FALCON_SENSOR_IMAGE=$LATESTSENSOR" >> $GITHUB_ENV

      # --- falconutil patch-image гЃ§ Sensorг‚’г‚¤гѓЎгѓјг‚ёгЃ«еџ‹г‚Ѓиѕјг‚Ђ ---
      - name: Inject Falcon Sensor into frontend image
        run: |
          docker run --user 0:0 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --rm ${{ env.FALCON_SENSOR_IMAGE }} \
            falconutil patch-image \
            --source-image-uri melos-frontend-base:${{ github.sha }} \
            --target-image-uri ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --falcon-image-uri ${{ env.FALCON_SENSOR_IMAGE }} \
            --cid ${{ secrets.FALCON_CID }} \
            --container melos-frontend

      # --- г‚¤гѓЎгѓјг‚ёг‚’ghcr.ioгЃ«push ---
      - name: Push frontend image (with sensor)
        run: docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Push mock-api image
        run: docker push ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}

      # --- CrowdStrike FCS Scan ---
      - name: CrowdStrike FCS - IaC Scan
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: iac
          path: .

      - name: CrowdStrike FCS - Image Scan (frontend)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: image
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: CrowdStrike FCS - Image Scan (mock-api)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: image
          image: ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}

      - name: CrowdStrike FCS - SBOM Generation (frontend)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: sbom
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: CrowdStrike FCS - SBOM Generation (mock-api)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: sbom
          image: ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}
