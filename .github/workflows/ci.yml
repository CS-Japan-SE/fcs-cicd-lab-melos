name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      mock-api-image: ${{ steps.meta-mock-api.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: melos-frontend:${{ github.sha }}
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Build mock-api image
        id: build-mock-api
        uses: docker/build-push-action@v5
        with:
          context: ./mock-api
          push: false
          tags: melos-mock-api:${{ github.sha }}
          outputs: type=docker,dest=/tmp/mock-api.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  fcs-scan:
    name: CrowdStrike FCS Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load --input /tmp/frontend.tar
          docker load --input /tmp/mock-api.tar

      - name: CrowdStrike FCS - IaC Scan
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: iac
          path: .

      - name: CrowdStrike FCS - Image Scan (frontend)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: image
          image: melos-frontend:${{ github.sha }}

      - name: CrowdStrike FCS - Image Scan (mock-api)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: image
          image: melos-mock-api:${{ github.sha }}

      - name: CrowdStrike FCS - SBOM Generation (frontend)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: sbom
          image: melos-frontend:${{ github.sha }}

      - name: CrowdStrike FCS - SBOM Generation (mock-api)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          scan_types: sbom
          image: melos-mock-api:${{ github.sha }}
