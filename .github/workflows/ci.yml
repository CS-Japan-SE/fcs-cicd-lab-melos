name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    name: Build, Inject Falcon Sensor & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "FRONTEND_IMAGE=ghcr.io/${REPO}/melos-frontend" >> $GITHUB_ENV
          echo "MOCK_API_IMAGE=ghcr.io/${REPO}/melos-mock-api" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- アプリイメージのビルド ---
      - name: Build frontend base image
        run: docker build -t melos-frontend-base:${{ github.sha }} ./frontend

      - name: Build mock-api image
        run: docker build -t ${{ env.MOCK_API_IMAGE }}:${{ github.sha }} ./mock-api

      # --- Falcon Container Sensor の取得 ---
      - name: Pull Falcon Container Sensor image
        run: |
          LATESTSENSOR=$(bash <(curl -Ls https://github.com/CrowdStrike/falcon-scripts/releases/latest/download/falcon-container-sensor-pull.sh) \
            -t falcon-container --platform x86_64 \
            -u ${{ secrets.FALCON_CLIENT_ID }} \
            -s ${{ secrets.FALCON_CLIENT_SECRET }} 2>&1 | tail -1)
          echo "FALCON_SENSOR_IMAGE=$LATESTSENSOR" >> $GITHUB_ENV

      # --- falconutil patch-image で Sensorをイメージに埋め込む ---
      - name: Inject Falcon Sensor into frontend image
        run: |
          docker run --user 0:0 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --rm ${{ env.FALCON_SENSOR_IMAGE }} \
            falconutil patch-image \
            --source-image-uri melos-frontend-base:${{ github.sha }} \
            --target-image-uri ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --falcon-image-uri ${{ env.FALCON_SENSOR_IMAGE }} \
            --cid ${{ secrets.FALCON_CID }} \
            --container melos-frontend \
            --image-pull-policy IfNotPresent

      # --- イメージをghcr.ioにpush ---
      - name: Push frontend image (with sensor)
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Push mock-api image
        run: |
          docker push ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.MOCK_API_IMAGE }}:${{ github.sha }} ${{ env.MOCK_API_IMAGE }}:latest
          docker push ${{ env.MOCK_API_IMAGE }}:latest

      # --- CrowdStrike FCS Scan ---
      - name: CrowdStrike FCS - IaC Scan
        uses: crowdstrike/fcs-action@v2.0.0
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_region: us-1
          path: .
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: CrowdStrike FCS - Image Scan (frontend)
        uses: crowdstrike/fcs-action@v4.0.1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_region: us-1
          scan_type: image
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: CrowdStrike FCS - Image Scan (mock-api)
        uses: crowdstrike/fcs-action@v4.0.1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_region: us-1
          scan_type: image
          image: ${{ env.MOCK_API_IMAGE }}:${{ github.sha }}
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
