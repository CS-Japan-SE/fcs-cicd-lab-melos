name: Deploy to Render

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy frontend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          echo "Frontend deploy triggered"

      - name: Deploy mock-api to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_MOCK_API }}"
          echo "Mock-api deploy triggered"
